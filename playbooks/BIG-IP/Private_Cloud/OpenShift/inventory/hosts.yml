---
all:
  children:

    # AAP delegates CIFS mount + virtctl upload tasks to this host
    bastion:
      hosts:
        bastion01:
          ansible_host: 192.168.1.10        # update to your bastion IP
          ansible_user: ansible
          ansible_ssh_private_key_file: "{{ bastion_ssh_key }}"

    # Logical group used for DO POST tasks (localhost, no SSH needed)
    f5_nodes:
      hosts:
        bigip-01:
          f5_mgmt_ip: "10.30.14.11"
          f5_hostname: "bigip-01.yourdomain.local"
          f5_ha_peer_ip: "10.30.12.12"
          f5_self_internal: "10.30.10.11/24"
          f5_self_external: "10.30.11.11/24"
          f5_self_ha: "10.30.12.11/24"
        bigip-02:
          f5_mgmt_ip: "10.30.14.12"
          f5_hostname: "bigip-02.yourdomain.local"
          f5_ha_peer_ip: "10.30.12.11"
          f5_self_internal: "10.30.10.12/24"
          f5_self_external: "10.30.11.12/24"
          f5_self_ha: "10.30.12.12/24"

    # All kubernetes.core.k8s tasks and DO REST calls run against
    # localhost (the EE container itself). No SSH. Auth comes entirely
    # from K8S_AUTH_* env vars injected by the AAP OCP credential.
    ocp_automation:
      hosts:
        localhost:
          ansible_connection: local
          ansible_python_interpreter: "{{ ansible_playbook_python }}"
