---
# ============================================================
# OpenShift cluster
# ============================================================
# ocp_api_url and auth are NOT set here.
# AAP injects them at runtime via the "OpenShift or Kubernetes API"
# credential type as environment variables:
#   K8S_AUTH_HOST        → OCP API URL
#   K8S_AUTH_API_KEY     → Bearer token
#   K8S_AUTH_VERIFY_SSL  → true/false
#   K8S_AUTH_SSL_CA_CERT → CA cert (if verify_ssl is true)
#
# kubernetes.core.k8s tasks read these env vars automatically.
# virtctl tasks on the bastion use a temp kubeconfig written at
# runtime from these same env vars and deleted after use.

ocp_namespace: "f5-bigip"

# ============================================================
# CIFS share (mount delegated to bastion)
# ============================================================
cifs_share: "//fileserver.yourdomain.local/images"
cifs_mountpoint: "/mnt/f5images"
cifs_username: "{{ vault_cifs_username }}"
cifs_password: "{{ vault_cifs_password }}"
cifs_domain: "YOURDOMAIN"
qcow2_filename: "BIGIP-17.5.1.5-0.0.6.qcow2"   # update to your image filename
virtctl_arch: "x86_64"
do_rpm_install_from_cifs: true    # set false if DO RPM not baked into image
do_filename: "f5-declarative-onboarding-1.48.0-3.noarch.rpm"
bastion_f5_cache: "/opt/f5/cache"   # persistent cache on bastion

# ============================================================
# CDI / DataVolume
# ============================================================
f5_datavolume_name: "f5-bigip-disk"           # name of disk
f5_disk_size: "120Gi"                         # destination size
f5_storage_class: "thin-csi"                  # update to your RWO block storageclass
f5_storage_access_mode: "ReadWriteMany"       # enables live migration (if not defined will default to ReadWriteOnce - No Live Migration)

# ============================================================
# VM compute spec
# ============================================================
f5_vm_cpu: 4
f5_vm_memory: "16Gi"

# ============================================================
# Network — VLANs and interface mapping
# ============================================================
# NIC order in the VirtualMachine spec must match this list exactly.
# NIC 0 = mgmt (pod network / VLAN 3014)
# NIC 1 = internal (Multus / VLAN 3010)
# NIC 2 = external (Multus / VLAN 3011)
# NIC 3 = ha      (Multus / VLAN 3012)

f5_networks:
  - name: internal
    vlan_id: 3010
    nad_name: "f5-internal"
    bigip_iface: "1.1"
  - name: external
    vlan_id: 3011
    nad_name: "f5-external"
    bigip_iface: "1.2"
  - name: ha
    vlan_id: 3012
    nad_name: "f5-ha"
    bigip_iface: "1.3"
  - name: mgmt
    vlan_id: 3014
    nad_name: "f5-mgmt"
    bigip_iface: "mgmt"

# nmstate nic utilized in cluster to create networking
nmstate_nic: "ens1f1"

# nstate bridge name used in cluster for the networking
nmstate_bridge_name: ovs-vms

# Floating (shared) IPs — only on internal and external
f5_float_internal: "10.30.10.10/24"
f5_float_external: "10.30.11.10/24"

# Default gateway (management plane)
f5_mgmt_gateway: "10.30.14.1"
f5_mgmt_prefix: "24"

# ============================================================
# DNS / NTP
# ============================================================
f5_dns_servers:
  - "192.168.10.10"
  - "192.168.10.11"
f5_dns_search:
  - "yourdomain.local"
f5_ntp_servers:
  - "192.168.10.20"
  - "pool.ntp.org"
f5_timezone: "America/New_York"

# ============================================================
# F5 credentials
# ============================================================
f5_admin_password: "{{ lookup('env', 'ANSIBLE_NET_PASSWORD') }}"
f5_root_password: "{{ lookup('env', 'ANSIBLE_NET_PASSWORD') }}"

# ============================================================
# F5 licensing
# ============================================================

# variable answer can be regkey bigiq
f5_license_type: regkey

# regKey licensing
f5_license_key_node1: "XXXXX-XXXXX-XXXXX-XXXXX-XXXXXXX"
f5_license_key_node2: "XXXXX-XXXXX-XXXXX-XXXXX-XXXXXXX"

# bigiq licensing
bigiq_host: "192.168.1.100"
bigiq_username: "{{ biq_username }}"
bigiq_password: "{{ biq_password }}"
bigiq_pool: "biq_pool_name"

# ============================================================
# Declarative Onboarding
# ============================================================
do_rpm_installed: false    # set false if DO RPM not baked into image
do_poll_interval: 30      # seconds between DO status polls
do_poll_retries: 40       # max polls (~20 min total)

# ============================================================
# HA
# ============================================================
f5_ha_enabled: true
f5_primary_node: "bigip-01"
f5_secondary_node: "bigip-02"
